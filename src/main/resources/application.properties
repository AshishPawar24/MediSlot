spring.application.name=core-service

# ===================== SERVER =====================
server.port=8080

# ===================== DATASOURCE =====================
spring.datasource.url=jdbc:mysql://localhost:3306/medislot_db
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===================== JPA / HIBERNATE =====================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ===================== LOGGING =====================
logging.level.org.springframework=INFO
logging.level.com.medislot=DEBUG

# ===================== JWT =====================
ms.jwt.secret=${MS_JWT_SECRET}
ms.jwt.access-expiration=${MS_JWT_ACCESS_EXPIRATION}
ms.jwt.refresh-expiration=${MS_JWT_REFRESH_EXPIRATION}